<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Mudra Detection</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.25rem 2rem;
    }
    .wrap {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    h1 {
      font-size: 1.65rem;
      font-weight: 700;
      margin: 0 0 0.65rem;
      letter-spacing: 0.03em;
      color: #fff;
    }
    .instruction-box {
      margin-bottom: 1.35rem;
      padding: 0 0.5rem;
    }
    .instruction-primary {
      font-size: 1.05rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      margin: 0 0 0.55rem;
      line-height: 1.5;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }
    .instruction-secondary {
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.65);
      margin: 0;
      line-height: 1.45;
      max-width: 32rem;
      margin-left: auto;
      margin-right: auto;
    }
    .stage {
      position: relative;
      width: min(640px, 100%);
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    video, canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
    video { transform: scaleX(-1); }
    canvas { display: none; }
    .guide {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .guide-box {
      width: 55%;
      height: 72%;
      border: 3px dashed rgba(130, 210, 255, 0.85);
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.28);
    }
    .result-wrap {
      margin-top: 1.75rem;
      min-height: 4.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      width: 100%;
    }
    .result {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.02em;
      max-width: 100%;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .result.detecting {
      font-size: 26px;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 600;
    }
    .result.live {
      color: #fff;
    }
    .result.nohand {
      font-size: 26px;
      color: #f87171;
      font-weight: 700;
    }
    .result.error {
      font-size: 1.1rem;
      color: #fca5a5;
      font-weight: 600;
    }
    .result.final {
      font-size: 34px;
      font-weight: 800;
      color: #4ade80;
      text-shadow: 0 0 24px rgba(74, 222, 128, 0.25);
    }
    button {
      margin-top: 1.75rem;
      padding: 0.65rem 1.5rem;
      border-radius: 10px;
      border: 1px solid #444;
      background: #1f1f1f;
      color: #fafafa;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover {
      background: #2a2a2a;
      border-color: #555;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Live Mudra Detection</h1>
    <div class="instruction-box">
      <p class="instruction-primary">Place your hand inside the box and hold steady</p>
      <p class="instruction-secondary">
        Press <strong>Reset</strong> to clear the session and start fresh (starts the camera the first time if it is not already on).
      </p>
    </div>
    <div class="stage">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div class="guide"><div class="guide-box"></div></div>
    </div>
    <div class="result-wrap">
      <div class="result detecting" id="mainPred">Detecting...</div>
    </div>
    <button type="button" id="btnReset">Reset</button>
  </div>
  <script>
    const API_BASE = 'http://127.0.0.1:8000';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnReset = document.getElementById('btnReset');
    const mainPred = document.getElementById('mainPred');

    const INTERVAL_MS = 400;
    const VOTE_WINDOW = 7;
    const LOCK_STREAK = 4;
    const MAJORITY_STRONG = 4;
    const UNSTABLE_MS = 3000;
    const MIN_CONF_FOR_VOTE = 0.2;
    const NULL_STREAK_TO_NOHAND = 3;

    function cleanMudraLabel(s) {
      if (s == null || typeof s !== 'string') return s;
      return s.split('(')[0].trim();
    }

    let timer = null;
    let stream = null;
    const recent = [];
    let lastMudra = null;
    let streak = 0;
    let lockedMudra = null;
    let lastStableMudra = null;
    let unstableSince = null;

    let lastRenderedKey = '';
    let nullStreak = 0;

    function setResultDisplay(text, mode) {
      const key = mode + '|' + text;
      if (key === lastRenderedKey) return;
      lastRenderedKey = key;
      mainPred.textContent = text;
      mainPred.className = 'result ' + mode;
    }

    function applyFullResetUI() {
      recent.length = 0;
      lockedMudra = null;
      streak = 0;
      lastMudra = null;
      unstableSince = null;
      lastStableMudra = null;
      nullStreak = 0;
      lastRenderedKey = '';
      setResultDisplay('Detecting...', 'detecting');
    }

    function majorityStats(arr) {
      const counts = {};
      for (const m of arr) counts[m] = (counts[m] || 0) + 1;
      let best = null;
      let n = -1;
      for (const [k, v] of Object.entries(counts)) {
        if (v > n) {
          n = v;
          best = k;
        }
      }
      return { label: best, count: n };
    }

    function drawFrame() {
      const w = video.videoWidth;
      const h = video.videoHeight;
      if (!w || !h) return null;
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      return new Promise((resolve) => {
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.92);
      });
    }

    function pickDisplayMajority(majLabel, majCount, now) {
      const unstable =
        recent.length >= VOTE_WINDOW && majCount < MAJORITY_STRONG;
      if (!unstable) {
        unstableSince = null;
        lastStableMudra = majLabel;
        return majLabel;
      }
      if (unstableSince == null) unstableSince = now;
      if (lastStableMudra != null && now - unstableSince >= UNSTABLE_MS) {
        return lastStableMudra;
      }
      return majLabel;
    }

    async function tick() {
      if (!stream || video.readyState < 2) return;
      const blob = await drawFrame();
      if (!blob) return;
      const fd = new FormData();
      fd.append('file', blob, 'frame.jpg');
      const now = performance.now();
      try {
        const res = await fetch(`${API_BASE}/mudra/predict-frame`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          nullStreak = 0;
          const err =
            res.status === 503 && data.detail ? String(data.detail) : `Error (${res.status})`;
          setResultDisplay(err, 'error');
          return;
        }

        const mudraRaw = data.mudra;
        const conf = typeof data.confidence === 'number' ? data.confidence : 0;

        if (mudraRaw == null || String(mudraRaw).trim() === '' || String(mudraRaw) === 'No Hand') {
          nullStreak += 1;
          if (lockedMudra == null && nullStreak >= NULL_STREAK_TO_NOHAND) {
            setResultDisplay('No hand detected ❌', 'nohand');
          }
          return;
        }

        nullStreak = 0;
        const mudra = cleanMudraLabel(String(mudraRaw));

        if (conf >= MIN_CONF_FOR_VOTE) {
          recent.push(mudra);
          while (recent.length > VOTE_WINDOW) recent.shift();
        }

        const { label: maj, count: majCount } = majorityStats(recent);
        const displayMaj = pickDisplayMajority(maj, majCount, now);

        if (lockedMudra == null) {
          if (conf >= MIN_CONF_FOR_VOTE) {
            if (mudra === lastMudra) streak += 1;
            else {
              lastMudra = mudra;
              streak = 1;
            }
            if (streak >= LOCK_STREAK) {
              lockedMudra = mudra;
            }
          }
        }

        if (lockedMudra != null) {
          const name = cleanMudraLabel(lockedMudra);
          setResultDisplay(` ${name} `, 'final');
        } else {
          const nameVote =
            displayMaj && String(displayMaj).length
              ? cleanMudraLabel(String(displayMaj))
              : mudra && mudra.length
                ? mudra
                : '';
          if (nameVote && nameVote.length) {
            setResultDisplay(`${nameVote} (${conf.toFixed(2)})`, 'live');
          } else {
            setResultDisplay('Detecting...', 'detecting');
          }
        }
      } catch (e) {
        nullStreak = 0;
        setResultDisplay('Network error', 'error');
      }
    }

    async function ensureCamera() {
      if (stream) return true;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30, max: 30 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        return true;
      } catch (e) {
        setResultDisplay('Camera unavailable', 'error');
        return false;
      }
    }

    btnReset.addEventListener('click', async () => {
      applyFullResetUI();
      const ok = await ensureCamera();
      if (!ok) return;
      if (timer) clearInterval(timer);
      timer = setInterval(tick, INTERVAL_MS);
    });
  </script>
</body>
</html>
